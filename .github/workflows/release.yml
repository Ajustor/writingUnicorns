name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: writing-unicorns-linux-x64

          #- os: macos-latest
          #  target: x86_64-apple-darwin
          #  artifact: writing-unicorns-macos-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: writing-unicorns-macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: writing-unicorns-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libssl-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libglib2.0-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/writing-unicorns ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/writing-unicorns.exe ${{ matrix.artifact }}

      # ── Windows extras ─────────────────────────────────────────────────────

      - name: Export icon (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Copy the release binary to target/release/ so the WiX manifest
          # finds it at the expected relative path.
          New-Item -ItemType Directory -Force -Path target\release | Out-Null
          Copy-Item target\${{ matrix.target }}\release\writing-unicorns.exe `
                    target\release\writing-unicorns.exe -Force

          # Convert PNG → ICO using built-in Windows APIs (no extra tools needed)
          .\scripts\New-Icon.ps1 `
            -Source      assets\icon.png `
            -Destination assets\icon.ico

      - name: Build Windows installer (MSI)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # WiX Toolset v3 is pre-installed on windows-latest runners.
          # Locate candle.exe and light.exe.
          $wixDir = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" |
                    Sort-Object Name -Descending | Select-Object -First 1
          if (-not $wixDir) {
            choco install wixtoolset --no-progress -y
            $wixDir = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" |
                      Sort-Object Name -Descending | Select-Object -First 1
          }
          $candle = Join-Path $wixDir.FullName "bin\candle.exe"
          $light  = Join-Path $wixDir.FullName "bin\light.exe"

          & $candle -arch x64 -out wix\main.wixobj wix\main.wxs
          & $light  -ext WixUIExtension -out writing-unicorns-setup.msi wix\main.wixobj

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload Windows installer (MSI)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: writing-unicorns-setup-msi
          path: writing-unicorns-setup.msi

      - name: Upload icon (ICO)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: writing-unicorns-icon-ico
          path: assets/icon.ico

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Writing Unicorns ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*
          generate_release_notes: true
